name: deploy

on:
  push:
    branches:
      - main

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 18.x

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install feedgen pyyaml

      - name: Install MyST Markdown
        run: npm install -g mystmd

      - name: Build HTML Assets
        # Remove BASE_URL if using a custom domain (CNAME)
        env:
          BASE_URL: /${{ github.event.repository.name }}
        run: myst build --html

      - name: Generate RSS and Atom feeds
        run: python generate_rss.py

      - name: Inject Giscus comments into blog posts
        run: python inject_comments.py

      - name: Copy static files
        run: |
          cp CNAME ./_build/html/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "./_build/html"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
